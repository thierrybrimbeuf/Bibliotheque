<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Bibliothèque</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1>📚 Ma Bibliothèque</h1>

    <p>Mes lectures et avis personnels</p>

</header>

<div class="admin-zone">

    <button id="adminBtn"
            class="admin-btn">

        📚 Administration

    </button>

</div>

<nav id="filtres"></nav>

<section class="search-zone">

    <input
        type="text"
        id="searchInput"
        placeholder="Rechercher un livre ou un auteur..."
    >

</section>

<main id="bibliotheque">

</main>




<div id="loginModal" class="modal">

    <div class="modal-content login-box">

        <h2>📚 Accès Bibliothécaire</h2>

        <p>Code PIN</p>

        <input
            type="password"
            id="adminCode"
            maxlength="4"
            placeholder="••••">

        <button id="loginBtn">
            Entrer
        </button>

    </div>

</div>

<div id="adminModal" class="modal">

  <div class="modal-content">

    <span class="close">&times;</span>

    <h2>Gestion de la bibliothèque</h2>

    <form id="bookForm">

      <input type="hidden" id="bookId">

      <label>Titre</label>
      <input type="text" id="titre" required>

      <label>Auteur</label>
      <input type="text" id="auteur" required>
      
      <label>Statut</label>

<select id="statut">
    <option value="lu">Lu</option>
    <option value="alire">À lire</option>
</select>

      
<label>Année</label>
<select id="année"></select>

<label>Mois</label>
<select id="dateLecture">

    <option>Janvier</option>
    <option>Février</option>
    <option>Mars</option>
    <option>Avril</option>
    <option>Mai</option>
    <option>Juin</option>
    <option>Juillet</option>
    <option>Août</option>
    <option>Septembre</option>
    <option>Octobre</option>
    <option>Novembre</option>
    <option>Décembre</option>

</select>

<label>Support</label>

<select id="support">

    <option value="Livre">Livre</option>
    <option value="BD">BD</option>
    <option value="Liseuse">Liseuse</option>

</select>
      

     

      <label>Statut</label>

      <label>Note</label>
      <input type="number" id="rating" min="0" max="5">

      <label>Nom de l'image (sans le dossier images/ ni .jpg)</label>

<input
    type="text"
    id="image"
    placeholder="Exemple : La-sentence">


      <label>Résumé</label>
      <textarea id="resume"></textarea>

      <label>Critique</label>
      <textarea id="critique"></textarea>

<label>Mon avis personnel</label>
<textarea id="avisPersonnel"></textarea>

      <button type="submit" id="saveBtn">
        Enregistrer
      </button>

    </form>

    <hr>

    <h3>Livres enregistrés</h3>

    <h3>Gestion des livres</h3>

<select id="bookSelector">

    <option value="">
        Choisir un livre...
    </option>

</select>

<div style="margin-top:15px;">

    <button type="button" id="editSelected">
        ✏️ Modifier
    </button>

    <button type="button" id="deleteSelected">
        🗑️ Supprimer
    </button>

</div>

    <button id="exportJson">
      💾 Export JSON
    </button>

  </div>

</div>

<div id="detailModal" class="modal-detail">

    <div class="detail-content">

        <span id="closeDetail" class="close-detail">&times;</span>

        <img id="detailImage"
             class="detail-cover"
             src=""
             alt="Couverture">

        <h2 id="detailTitre"></h2>

        <p>
            <strong>Auteur :</strong>
            <span id="detailAuteur"></span>
        </p>

        <p>
            <strong>Date :</strong>
            <span id="detailDate"></span>
        </p>

        <p>
            <strong>Support :</strong>
            <span id="detailSupport"></span>
        </p>

        <p>
            <strong>Note :</strong>
            <span id="detailNote"></span>
        </p>

        <hr>

        <h3>📖 Résumé</h3>
        <p id="detailResume"></p>

        <h3>📰 Critique</h3>
        <p id="detailCritique"></p>

        <h3>💬 Mon avis personnel</h3>
        <p id="detailAvis"></p>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
